# ─── Subscriptions ────────────────────────────────────────────────────
#
# These are NOT consumed by graphql-request — codegen still emits typed
# Document + result types, and src/client.ts hands them to graphql-ws.

subscription RunProject($projectId: ID!) {
  runProject(projectId: $projectId) {
    __typename
    ... on RunExecutionEvent {
      ts
      payload
    }
    ... on RunGateEvent {
      ts
      gate
      status
      gateMessage: message
    }
    ... on RunDoneEvent {
      ts
      ok
    }
    ... on RunErrorEvent {
      ts
      code
      message
    }
  }
}

subscription ChatStream($projectId: ID!, $input: ChatInput!) {
  chatStream(projectId: $projectId, input: $input) {
    __typename
    ... on ChatStartDelta {
      startTurnId: turnId
      startProvider: provider
      startModel: model
    }
    ... on ChatTextDelta {
      textTurnId: turnId
      text
    }
    ... on ChatThinkingDelta {
      thinkingTurnId: turnId
      thinkingText: text
    }
    ... on ChatToolUseDelta {
      toolUseTurnId: turnId
      toolUse
    }
    ... on ChatDoneDelta {
      doneTurnId: turnId
      doneProvider: provider
      doneModel: model
      usage
    }
    ... on ChatErrorDelta {
      errorTurnId: turnId
      code
      message
    }
  }
}

subscription InlineCompletion($input: InlineInput!) {
  inlineCompletion(input: $input) {
    __typename
    ... on InlineStartDelta {
      startRequestId: requestId
      startProvider: provider
      startModel: model
    }
    ... on InlineTextDelta {
      textRequestId: requestId
      text
    }
    ... on InlineDoneDelta {
      doneRequestId: requestId
      doneProvider: provider
      doneModel: model
      usage
    }
    ... on InlineCancelledDelta {
      cancelledRequestId: requestId
      reason
    }
    ... on InlineErrorDelta {
      errorRequestId: requestId
      code
      message
    }
  }
}

subscription DeployStream($deployId: ID!) {
  deployStream(deployId: $deployId) {
    __typename
    ... on DeployStateEvent {
      deployId
      status
      ts
    }
    ... on DeployLogEvent {
      logDeployId: deployId
      logLine: line {
        ts
        level
        message
      }
    }
    ... on DeployFinishedEvent {
      finishedDeployId: deployId
      finishedStatus: status
      url
      durationMs
    }
    ... on DeployErrorEvent {
      errorDeployId: deployId
      code
      message
    }
    ... on DeployBuildLogLine {
      buildTs: ts
      source
      buildLine: line
    }
  }
}

subscription WorkspacePty($workspaceId: ID!) {
  workspacePty(workspaceId: $workspaceId) {
    __typename
    ... on PtyOutput {
      data
    }
    ... on PtyExit {
      code
    }
  }
}

subscription CostStream {
  costStream {
    ts
    usdSpent
    model
    provider
    agent
    durationMs
  }
}
