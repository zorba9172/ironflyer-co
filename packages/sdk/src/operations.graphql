# Curated public operations for @ironflyer/sdk.
#
# These are the operations the SDK exposes to third-party integrators.
# Internal / admin / experimental operations (affiliates, telemetry,
# SAML config, collab cursors, federation, mcpRPC, etc.) are
# deliberately omitted — third parties shouldn't depend on them and
# they tend to change without notice.
#
# Add a new operation here, then run `npm run codegen` and (if a method
# wrapper is required) update src/client.ts.

# ─── Shared fragments ─────────────────────────────────────────────────

fragment UserFields on User {
  id
  email
  name
  plan
  orgId
  telemetryOptOut
  createdAt
}

fragment SessionFields on Session {
  token
  expiresAt
  user {
    ...UserFields
  }
}

fragment GateVerdictFields on GateVerdict {
  gate
  status
  startedAt
  finishedAt
  durationMs
  notes
  issues {
    path
    line
    rule
    severity
    message
  }
}

fragment ProjectFields on Project {
  id
  name
  description
  status
  ownerId
  isPublic
  idea
  createdAt
  updatedAt
  github {
    owner
    repo
    fullName
    defaultBranch
    htmlUrl
  }
}

fragment PatchFields on Patch {
  id
  projectId
  title
  summary
  author
  status
  createdAt
  appliedAt
  changes {
    op
    path
    content
    anchor
    replacement
    symbol
  }
}

fragment ChatFields on Chat {
  id
  projectId
  title
  parentChatId
  messageCount
  createdAt
  updatedAt
}

fragment ChatMessageFields on ChatMessage {
  id
  chatId
  role
  text
  toolUse
  createdAt
  provider
  model
  usage
  attachments {
    mediaType
    base64
  }
}

fragment WorkspaceFields on Workspace {
  id
  projectId
  driver
  status
  createdAt
  updatedAt
}

fragment DeployFields on Deploy {
  id
  projectId
  target
  targetMeta
  status
  url
  startedAt
  finishedAt
  durationMs
  artifact
  log {
    ts
    level
    message
  }
}

fragment MemoryRecordFields on MemoryRecord {
  id
  kind
  userId
  projectId
  storyId
  gateName
  title
  body
  tags
  createdAt
}

fragment AuditEntryFields on AuditEntry {
  id
  ts
  userId
  projectId
  action
  outcome
  ok
  actor
  resource
  storyId
  gateName
  agentRole
  summary
  hash
  prevHash
  inputHash
  outputHash
  payload
}

fragment WebhookFields on WebhookSubscription {
  id
  userId
  url
  events
  secret
  enabled
  createdAt
  lastDeliveryAt
}

# ─── Auth ─────────────────────────────────────────────────────────────

query Me {
  me {
    ...UserFields
  }
}

mutation SignIn($input: SignInInput!) {
  signIn(input: $input) {
    ...SessionFields
  }
}

mutation SignUp($input: SignUpInput!) {
  signUp(input: $input) {
    ...SessionFields
  }
}

mutation SignOut {
  signOut {
    ok
  }
}

# ─── Projects ─────────────────────────────────────────────────────────

query Projects {
  projects {
    ...ProjectFields
  }
}

query Project($id: ID!) {
  project(id: $id) {
    ...ProjectFields
    files {
      path
      size
      language
      updatedAt
    }
    gates {
      ...GateVerdictFields
    }
  }
}

query ProjectFiles($id: ID!) {
  projectFiles(id: $id) {
    path
    content
    size
    language
    updatedAt
  }
}

query ProjectGraph($id: ID!) {
  projectGraph(id: $id) {
    nodes {
      id
      path
      language
      size
    }
    edges {
      from
      to
      kind
    }
  }
}

query ProjectSnapshot($id: ID!) {
  projectSnapshot(id: $id)
}

query SearchProjectCode($id: ID!, $q: String!, $k: Int, $maxKb: Int) {
  searchProjectCode(id: $id, q: $q, k: $k, maxKb: $maxKb) {
    path
    startLine
    endLine
    symbols
    score
    text
  }
}

mutation CreateProject($input: CreateProjectInput!) {
  createProject(input: $input) {
    ...ProjectFields
  }
}

mutation UpdateProject($id: ID!, $input: UpdateProjectInput!) {
  updateProject(id: $id, input: $input) {
    ...ProjectFields
  }
}

mutation DeleteProject($id: ID!) {
  deleteProject(id: $id) {
    ok
  }
}

mutation BulkDeleteProjects($ids: [ID!]!) {
  bulkDeleteProjects(ids: $ids) {
    ok
  }
}

