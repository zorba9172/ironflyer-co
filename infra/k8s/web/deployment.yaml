apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: ironflyer
data:
  NODE_ENV: "production"
  # The Next.js rewrites point at the cluster-internal services; the browser
  # always talks to /api/orchestrator and /api/runtime on the web origin.
  ORCHESTRATOR_INTERNAL_URL: "http://orchestrator:8080"
  RUNTIME_INTERNAL_URL: "http://runtime:8090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ironflyer
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: ironflyer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: ghcr.io/zorba9172/ironflyer-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: web-config
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ironflyer
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 3000
      targetPort: http
