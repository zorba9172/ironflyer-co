{{- if .Values.runtime.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-config
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: runtime
data:
  IRONFLYER_RUNTIME_ADDR: ":8090"
  IRONFLYER_RUNTIME_DRIVER: {{ .Values.runtime.driver | quote }}
  IRONFLYER_RUNTIME_WORKSPACE_DIR: "/workspaces"
  IRONFLYER_RUNTIME_CORS_ORIGIN: {{ printf "https://%s" .Values.host | quote }}
  IRONFLYER_LOG_FORMAT: "json"
  IRONFLYER_LOG_LEVEL: "info"
  IRONFLYER_JWT_ISSUER: "ironflyer"
  {{- if .Values.otel.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_SERVICE_NAME: "ironflyer-runtime"
  {{- end }}
  # Sentry trace sampling rate. DSN itself comes from the Sentry Secret
  # via env.secretKeyRef below so it never appears in this ConfigMap.
  SENTRY_TRACES_SAMPLE: {{ .Values.sentry.tracesSampleRate | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runtime-workspaces
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: runtime
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.runtime.workspacesPVC.size }}
  {{- with .Values.runtime.workspacesPVC.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: runtime
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy: { type: {{ .Values.runtime.strategy }} }
  selector:
    matchLabels:
      {{- include "ironflyer.selectorLabels" (dict "name" "runtime" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ironflyer.labels" . | nindent 8 }}
        {{- include "ironflyer.selectorLabels" (dict "name" "runtime" "release" .Release.Name) | nindent 8 }}
      annotations:
        {{- include "ironflyer.podAnnotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/runtime.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "ironflyer.serviceAccountName" (dict "name" "runtime" "Values" .Values "Release" .Release "Chart" .Chart) }}
      {{- $pc := include "ironflyer.priorityClassName" . }}
      {{- if $pc }}
      priorityClassName: {{ $pc }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "ironflyer.podSecurityContext" . | nindent 8 }}
      containers:
        - name: runtime
          image: {{ include "ironflyer.image" (dict "name" "runtime" "Values" .Values) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 8090 }
          envFrom:
            - configMapRef: { name: runtime-config }
          env:
            - name: IRONFLYER_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orchestrator.secrets.name }}
                  key: IRONFLYER_JWT_SECRET
            # Runtime doesn't speak to Postgres directly today, but the
            # workspace driver may emit ledger rows in future. Wire the
            # Secret-backed DSN now so credentials never leak via ConfigMap.
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.postgresSecretName" . }}
                  key: POSTGRES_URL
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.postgresSecretName" . }}
                  key: postgres-password
            {{- if include "ironflyer.sentryEnabled" . }}
            # Sentry DSNs — RUNTIME_SENTRY_DSN takes precedence over the
            # shared SENTRY_DSN inside the runtime binary, so dashboards
            # can split orchestrator vs runtime events without a shared
            # project. `optional: true` so a Secret missing one key (e.g.
            # only the shared SENTRY_DSN is populated) still mounts.
            - name: RUNTIME_SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.sentrySecretName" . }}
                  key: RUNTIME_SENTRY_DSN
                  optional: true
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.sentrySecretName" . }}
                  key: SENTRY_DSN
                  optional: true
            {{- end }}
          startupProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.runtime.resources | nindent 12 }}
          volumeMounts:
            - { name: workspaces, mountPath: /workspaces }
            - { name: tmp, mountPath: /tmp }
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.runtime.readOnlyRootFilesystem }}
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
      volumes:
        - name: workspaces
          persistentVolumeClaim: { claimName: runtime-workspaces }
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: runtime
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: runtime
spec:
  selector:
    {{- include "ironflyer.selectorLabels" (dict "name" "runtime" "release" .Release.Name) | nindent 4 }}
  ports:
    - { name: http, port: 8090, targetPort: http }
{{- end }}
