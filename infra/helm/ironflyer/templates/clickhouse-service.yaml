{{- if .Values.clickhouse.enabled -}}
# ClickHouse service exposing the native (9000) and HTTP (8123) ports.
# Backed by the single-replica StatefulSet in clickhouse-statefulset.yaml.
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: clickhouse
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - { name: native, port: 9000, targetPort: 9000 }
    - { name: http,   port: 8123, targetPort: 8123 }
---
# Headless service for stable StatefulSet pod DNS
# (`clickhouse-0.clickhouse-headless.<ns>.svc.cluster.local`).
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-headless
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: clickhouse
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - { name: native, port: 9000, targetPort: 9000 }
    - { name: http,   port: 8123, targetPort: 8123 }
{{- end }}
