{{- if .Values.redpanda.enabled -}}
# Redpanda services — durable event backbone per ARCHITECTURE_EVENTS.md.
# Two services: a headless one for stable broker DNS used by intra-cluster
# Kafka clients (and by KEDA's `bootstrapServers`), and a ClusterIP service
# in front of the admin API.
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: redpanda
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - { name: kafka,     port: 9092, targetPort: 9092 }
    - { name: admin,     port: 9644, targetPort: 9644 }
    - { name: rpc,       port: 33145, targetPort: 33145 }
    - { name: schemareg, port: 8081, targetPort: 8081 }
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-admin
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: redpanda
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redpanda
  ports:
    - { name: admin,     port: 9644, targetPort: 9644 }
    - { name: schemareg, port: 8081, targetPort: 8081 }
{{- end }}
