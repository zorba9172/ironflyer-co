{{- if .Values.web.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
data:
  NODE_ENV: "production"
  ORCHESTRATOR_INTERNAL_URL: "http://orchestrator:8080"
  RUNTIME_INTERNAL_URL: "http://runtime:8090"
  {{- if .Values.otel.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_SERVICE_NAME: "ironflyer-web"
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
spec:
  replicas: {{ .Values.web.replicas | default .Values.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ironflyer.selectorLabels" (dict "name" "web" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ironflyer.labels" . | nindent 8 }}
        {{- include "ironflyer.selectorLabels" (dict "name" "web" "release" .Release.Name) | nindent 8 }}
      annotations:
        {{- include "ironflyer.podAnnotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/web.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "ironflyer.serviceAccountName" (dict "name" "web" "Values" .Values "Release" .Release "Chart" .Chart) }}
      {{- $pc := include "ironflyer.priorityClassName" . }}
      {{- if $pc }}
      priorityClassName: {{ $pc }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "ironflyer.podSecurityContext" . | nindent 8 }}
      {{- include "ironflyer.spread" (dict "name" "web") | nindent 6 }}
      containers:
        - name: web
          image: {{ include "ironflyer.image" (dict "name" "web" "Values" .Values) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 3000 }
          envFrom:
            - configMapRef: { name: web-config }
          startupProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.web.readOnlyRootFilesystem }}
            capabilities:
              drop: ["ALL"]
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          volumeMounts:
            - { name: cache, mountPath: /app/.next/cache }
            - { name: tmp,   mountPath: /tmp }
      volumes:
        - name: cache
          emptyDir: { sizeLimit: 512Mi }
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: web
spec:
  selector:
    {{- include "ironflyer.selectorLabels" (dict "name" "web" "release" .Release.Name) | nindent 4 }}
  ports:
    - { name: http, port: 3000, targetPort: http }
{{- end }}
