{{- if .Values.orchestrator.enabled -}}
{{- /*
Multi-region guardrail. Production releases set `.Values.requireRegion: true`
so a chart shipped with `.Values.region == "unknown"` fails at template-render
time rather than landing in the cluster as an unlabelled, audit-trail-broken
deployment. See docs/MULTI_REGION.md § Operator responsibility.
*/ -}}
{{- if and .Values.requireRegion (eq (.Values.region | default "unknown") "unknown") -}}
{{- fail "values.region is required (eu | us | il). Set --set region=<code> or disable the guardrail with --set requireRegion=false. See docs/MULTI_REGION.md." -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: orchestrator
data:
  IRONFLYER_ADDR: ":8080"
  IRONFLYER_RUNTIME_URL: "http://runtime:8090"
  # POSTGRES_URL is intentionally NOT in this ConfigMap. The Postgres DSN
  # (which embeds the password) lives in the Secret minted by
  # templates/postgres-secret.yaml — or in `.Values.postgres.existingSecret`
  # when you bring your own — and is injected into the orchestrator
  # container via env.secretKeyRef below. ConfigMaps are plaintext and
  # cluster-readable; database credentials must never land in one.
  GITHUB_REDIRECT_URL: {{ printf "https://%s/auth/github/callback" .Values.host | quote }}
  GITHUB_POST_LOGIN_URL: {{ printf "https://%s/app" .Values.host | quote }}
  STRIPE_SUCCESS_URL: {{ printf "https://%s/app/settings?stripe=success" .Values.host | quote }}
  STRIPE_CANCEL_URL: {{ printf "https://%s/pricing?stripe=cancel" .Values.host | quote }}
  IRONFLYER_SCAFFOLD_ROOT: "/app/templates"
  IRONFLYER_TEMPORAL_NAMESPACE: {{ .Values.orchestrator.temporal.namespace | quote }}
  IRONFLYER_TEMPORAL_TASK_QUEUE: {{ .Values.orchestrator.temporal.taskQueue | quote }}
  {{- if .Values.orchestrator.temporal.host }}
  IRONFLYER_TEMPORAL_HOST: {{ .Values.orchestrator.temporal.host | quote }}
  {{- end }}
  IRONFLYER_EMAIL_PROVIDER: {{ .Values.orchestrator.email.provider | quote }}
  IRONFLYER_EMAIL_FROM: {{ .Values.orchestrator.email.from | quote }}
  # Data-residency stamp. Read by the orchestrator's audit + storage
  # layers so every persisted event proves which region processed it.
  # Must match `.Values.region`. See docs/compliance/DATA_RESIDENCY.md.
  IRONFLYER_DATA_RESIDENCY: {{ .Values.region | default "unknown" | quote }}
  {{- if .Values.otel.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.otel.endpoint | quote }}
  OTEL_SERVICE_NAME: "ironflyer-orchestrator"
  {{- end }}
  # Sentry — the DSN itself is wired via env.secretKeyRef below so it
  # never lands in this ConfigMap. SENTRY_TRACES_SAMPLE controls trace
  # sampling and is non-sensitive, so it stays here.
  SENTRY_TRACES_SAMPLE: {{ .Values.sentry.tracesSampleRate | quote }}
  {{- range $k, $v := .Values.orchestrator.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- if .Values.orchestrator.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.orchestrator.secrets.name }}
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: orchestrator
type: Opaque
stringData:
  {{- range $k, $v := .Values.orchestrator.secrets.data }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicas | default .Values.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ironflyer.selectorLabels" (dict "name" "orchestrator" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ironflyer.labels" . | nindent 8 }}
        {{- include "ironflyer.selectorLabels" (dict "name" "orchestrator" "release" .Release.Name) | nindent 8 }}
      annotations:
        {{- include "ironflyer.podAnnotations" . | nindent 8 }}
        checksum/config: {{ include (print $.Template.BasePath "/orchestrator.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "ironflyer.serviceAccountName" (dict "name" "orchestrator" "Values" .Values "Release" .Release "Chart" .Chart) }}
      {{- $pc := include "ironflyer.priorityClassName" . }}
      {{- if $pc }}
      priorityClassName: {{ $pc }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- include "ironflyer.podSecurityContext" . | nindent 8 }}
      {{- include "ironflyer.spread" (dict "name" "orchestrator") | nindent 6 }}
      containers:
        - name: orchestrator
          image: {{ include "ironflyer.image" (dict "name" "orchestrator" "Values" .Values) }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: orchestrator-config }
            - secretRef:    { name: {{ .Values.orchestrator.secrets.name }} }
          env:
            # Database credentials come exclusively from the Postgres Secret
            # — never from the ConfigMap. See templates/postgres-secret.yaml
            # and `.Values.postgres.existingSecret`.
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.postgresSecretName" . }}
                  key: POSTGRES_URL
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.postgresSecretName" . }}
                  key: postgres-password
            {{- if include "ironflyer.sentryEnabled" . }}
            # Sentry DSN — sourced from the chart-minted Secret or
            # `.Values.sentry.existingSecret`. An empty value keeps the
            # SDK in no-op mode, so a partially-configured Sentry Secret
            # is still safe to ship.
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "ironflyer.sentrySecretName" . }}
                  key: SENTRY_DSN
                  optional: true
            {{- end }}
          startupProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /livez, port: http }
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
          securityContext:
            {{- include "ironflyer.containerSecurityContext" . | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.preStopSleepSeconds }}"]
          volumeMounts:
            - { name: tmp,   mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/ironflyer }
      volumes:
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 64Mi }
        - name: cache
          emptyDir: { sizeLimit: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: orchestrator
spec:
  selector:
    {{- include "ironflyer.selectorLabels" (dict "name" "orchestrator" "release" .Release.Name) | nindent 4 }}
  ports:
    - { name: http, port: 8080, targetPort: http }
{{- end }}
