{{- if .Values.clickhouse.enabled -}}
# ClickHouse — analytics store for Redpanda projection consumers
# (per ARCHITECTURE_EVENTS.md: dashboards, cost attribution, audit
# projections). Single-replica StatefulSet with a dedicated PVC; for
# multi-shard production deploys swap in the official ClickHouse
# Operator chart and disable this resource.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: clickhouse
spec:
  serviceName: clickhouse-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # ClickHouse image runs as uid 101 (`clickhouse`); satisfies PSS
      # `restricted` (non-root, non-zero).
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clickhouse
          image: {{ .Values.clickhouse.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - { name: native, containerPort: 9000 }
            - { name: http,   containerPort: 8123 }
            - { name: interserver, containerPort: 9009 }
          env:
            - name: CLICKHOUSE_DB
              value: "ironflyer"
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "4",    memory: "8Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
              # ClickHouse benefits from IPC_LOCK for mlock; harmless if denied.
              add: ["IPC_LOCK"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - { name: data,   mountPath: /var/lib/clickhouse }
            - { name: logs,   mountPath: /var/log/clickhouse-server }
            - { name: tmp,    mountPath: /tmp }
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "ironflyer.labels" . | nindent 10 }}
          app.kubernetes.io/name: clickhouse
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.clickhouse.storageClass }}
        storageClassName: {{ .Values.clickhouse.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.clickhouse.storageSize | quote }}
{{- end }}
