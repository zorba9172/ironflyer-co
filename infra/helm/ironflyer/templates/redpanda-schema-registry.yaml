{{- if and .Values.redpanda.enabled .Values.redpanda.schemaRegistry.enabled -}}
# Redpanda Console + bundled Schema Registry UI.
#
# Per ARCHITECTURE_EVENTS.md § Schema Registry, every topic uses a
# subject-per-event-type model with JSON Schema by default. Redpanda's
# broker already exposes a Schema Registry API on port 8081 of each
# broker (via `redpanda` service); the Console here ships a UI that
# operators use to inspect subjects, view topic lag, and run replay
# audits.
#
# Off unless both redpanda.enabled AND redpanda.schemaRegistry.enabled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: redpanda-console-config
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: redpanda-console
data:
  config.yaml: |
    kafka:
      brokers:
        - "redpanda:9092"
      schemaRegistry:
        enabled: true
        urls:
          - "http://redpanda:8081"
    redpanda:
      adminApi:
        enabled: true
        urls:
          - "http://redpanda-admin:9644"
    server:
      listenPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda-console
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: redpanda-console
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redpanda-console
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-console
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: redpanda-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redpanda-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redpanda-console
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- include "ironflyer.podSecurityContext" . | nindent 8 }}
      containers:
        - name: console
          image: {{ .Values.redpanda.schemaRegistry.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          args:
            - "-config.filepath=/etc/console/config.yaml"
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet:
              path: /admin/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /admin/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            {{- include "ironflyer.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - { name: config, mountPath: /etc/console }
      volumes:
        - name: config
          configMap:
            name: redpanda-console-config
{{- end }}
