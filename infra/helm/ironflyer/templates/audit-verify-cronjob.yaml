{{- if .Values.auditVerify.enabled -}}
# Hourly audit-chain integrity probe.
#
# Hits the orchestrator's /audit/verify endpoint via the in-cluster
# Service. On chain_valid=false (or any failure path) the embedded
# script emits a structured error log line and POSTs a Slack/Discord
# webhook. The pod exits non-zero so the CronJob is marked Failed and
# Alertmanager can page off ConfigMap-controlled `kube_job_failed` if
# the webhook channel is itself down.
#
# Image: curlimages/curl — minimal, has curl + busybox sh built in.
# Gated by .Values.auditVerify.enabled (default true).
apiVersion: v1
kind: Secret
metadata:
  name: audit-verify-secrets
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: audit-verify
type: Opaque
stringData:
  AUDIT_BEARER: {{ .Values.auditVerify.bearer | quote }}
  ALERT_WEBHOOK_URL: {{ .Values.auditVerify.alertWebhookURL | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-verify-script
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: audit-verify
data:
  audit-verify-cron.sh: |
    #!/bin/sh
    # Mirrors scripts/audit-verify-cron.sh from the repo. Update both in
    # lockstep — the script is small enough to inline so the image stays
    # at curlimages/curl with no init-container dance.
    set -u
    : "${IRONFLYER_API_URL:?IRONFLYER_API_URL is required}"
    : "${AUDIT_BEARER:?AUDIT_BEARER is required}"
    : "${ALERT_WEBHOOK_URL:?ALERT_WEBHOOK_URL is required}"
    URL="${IRONFLYER_API_URL%/}/audit/verify"
    TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
    log_error() { printf 'time=%s level=error component=audit-verify-cron %s\n' "$TS" "$*" >&2; }
    log_info()  { printf 'time=%s level=info  component=audit-verify-cron %s\n' "$TS" "$*"; }
    post_alert() {
      msg="$1"
      payload=$(printf '{"text": "Ironflyer audit chain broken at %s — %s"}' "$TS" "$msg")
      curl --silent --show-error --fail --max-time 10 \
           -H 'Content-Type: application/json' -X POST -d "$payload" \
           "$ALERT_WEBHOOK_URL" >/dev/null 2>&1 || log_error msg=\"webhook post failed\"
    }
    RESP=$(curl --silent --show-error --max-time 15 \
                -H "Authorization: Bearer $AUDIT_BEARER" \
                -H 'Accept: application/json' \
                -w '\n%{http_code}' \
                "$URL") || { log_error msg=\"curl failed\" url="$URL"; post_alert "audit verify HTTP call failed"; exit 2; }
    STATUS=$(printf '%s' "$RESP" | awk 'END{print}')
    BODY=$(printf '%s' "$RESP" | sed '$d')
    if [ "$STATUS" != "200" ]; then
      log_error chain_break=true http_status="$STATUS" body="$BODY"
      post_alert "audit verify returned HTTP $STATUS"
      exit 3
    fi
    VALID=$(printf '%s' "$BODY" | grep -oE '"chain_valid"[[:space:]]*:[[:space:]]*(true|false)' | head -n 1 | grep -oE '(true|false)')
    if [ -z "$VALID" ]; then
      log_error chain_break=true reason=\"chain_valid missing\" body="$BODY"
      post_alert "audit verify response missing chain_valid field"
      exit 4
    fi
    if [ "$VALID" = "false" ]; then
      BROKEN_ID=$(printf '%s' "$BODY" | grep -oE '"broken_event_id"[[:space:]]*:[[:space:]]*"[^"]*"' | head -n 1 | sed 's/.*"\([^"]*\)"$/\1/')
      log_error chain_break=true broken_event_id="${BROKEN_ID:-unknown}" body="$BODY"
      post_alert "chain_valid=false; first broken event id: ${BROKEN_ID:-unknown}"
      exit 1
    fi
    log_info chain_valid=true
    exit 0
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: audit-verify
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: audit-verify
spec:
  # Every hour, on the hour.
  schedule: {{ .Values.auditVerify.schedule | default "0 * * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 60
      template:
        metadata:
          labels:
            {{- include "ironflyer.selectorLabels" (dict "name" "audit-verify" "release" .Release.Name) | nindent 12 }}
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: audit-verify
              image: {{ .Values.auditVerify.image | default "curlimages/curl:8.7.1" | quote }}
              imagePullPolicy: {{ .Values.imagePullPolicy }}
              command: ["/bin/sh", "/scripts/audit-verify-cron.sh"]
              env:
                - name: IRONFLYER_API_URL
                  value: {{ .Values.auditVerify.apiURL | default (printf "http://orchestrator:8080") | quote }}
                - name: AUDIT_BEARER
                  valueFrom:
                    secretKeyRef:
                      name: audit-verify-secrets
                      key: AUDIT_BEARER
                - name: ALERT_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: audit-verify-secrets
                      key: ALERT_WEBHOOK_URL
              resources:
                requests: { cpu: "10m",  memory: "16Mi" }
                limits:   { cpu: "100m", memory: "64Mi" }
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: audit-verify-script
                defaultMode: 0555
{{- end }}
