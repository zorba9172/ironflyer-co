{{/*
Postgres credential Secret. Two modes:

  1. `postgres.existingSecret` set  → chart references that Secret as-is and
     emits nothing here. The external Secret MUST expose:
        - postgres-password   (raw password)
        - POSTGRES_URL        (full DSN: postgres://user:pass@host:5432/db?...)
     and optionally POSTGRES_USER / POSTGRES_DB / POSTGRES_PASSWORD for the
     in-cluster Postgres StatefulSet's envFrom.

  2. `postgres.existingSecret` empty → we template the Secret from
     `postgres.password` (required — install fails fast if blank).

Either way the rest of the chart pulls credentials via
`include "ironflyer.postgresSecretName" .`.
*/}}
{{- if not .Values.postgres.existingSecret -}}
{{- $pw := required "postgres.password is required. Set it via `--set postgres.password=<strong-password>` or point at a pre-existing Secret with `--set postgres.existingSecret=<name>`. The default chart password was intentionally removed for security." .Values.postgres.password -}}
{{- $user := .Values.postgres.user -}}
{{- $db := .Values.postgres.database -}}
{{- $host := default "postgres" .Values.postgres.host -}}
{{- $port := default 5432 .Values.postgres.port -}}
{{- $sslmode := default "disable" .Values.postgres.sslmode -}}
{{- $dsn := printf "postgres://%s:%s@%s:%v/%s?sslmode=%s" $user $pw $host $port $db $sslmode -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ironflyer.postgresSecretName" . }}
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/name: postgres
type: Opaque
stringData:
  # Canonical keys consumed by orchestrator/web/runtime via secretKeyRef.
  postgres-password: {{ $pw | quote }}
  POSTGRES_URL: {{ $dsn | quote }}
  # Compatibility keys consumed by the in-cluster Postgres StatefulSet
  # (postgres:16-alpine reads POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
  # from env on first boot to initialize the cluster).
  POSTGRES_USER: {{ $user | quote }}
  POSTGRES_PASSWORD: {{ $pw | quote }}
  POSTGRES_DB: {{ $db | quote }}
{{- end }}
