{{- if .Values.sentry.createSecret }}
{{- if .Values.sentry.existingSecret }}
{{- fail "sentry.createSecret and sentry.existingSecret are mutually exclusive — set one or the other." }}
{{- end }}
# Sentry DSN bundle. The chart only mints this Secret when
# `sentry.createSecret: true`. Production deployments should prefer
# `sentry.existingSecret: <name>` so the DSN never lands in Helm values
# (which routinely end up in CI logs or git). Empty values are still
# valid — each service's SDK no-ops when its DSN env var is empty.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ironflyer.sentrySecretName" . }}
  labels:
    {{- include "ironflyer.labels" . | nindent 4 }}
    app.kubernetes.io/component: sentry
type: Opaque
stringData:
  SENTRY_DSN: {{ .Values.sentry.data.SENTRY_DSN | quote }}
  RUNTIME_SENTRY_DSN: {{ .Values.sentry.data.RUNTIME_SENTRY_DSN | quote }}
  NEXT_PUBLIC_SENTRY_DSN: {{ .Values.sentry.data.NEXT_PUBLIC_SENTRY_DSN | quote }}
{{- end }}
