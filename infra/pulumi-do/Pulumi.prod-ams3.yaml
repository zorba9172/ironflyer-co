config:
  ironflyer:region: ams3
  ironflyer:doksNodeSize: s-4vcpu-8gb
  ironflyer:doksNodeCount: "3"
  ironflyer:doksMaxNodes: "12"
  ironflyer:doksRuntimeNodeSize: s-8vcpu-16gb
  ironflyer:doksRuntimeNodeCount: "3"
  ironflyer:doksRuntimeMaxNodes: "20"
  ironflyer:k8sVersion: 1.30.6-do.0
  ironflyer:postgresSize: db-s-4vcpu-8gb
  ironflyer:postgresVersion: "16"
  ironflyer:redisSize: db-s-2vcpu-4gb
  ironflyer:redisVersion: "7"
  ironflyer:enableHA: "true"
  ironflyer:vercelEnabled: "true"
  # Production domain registered at the DigitalOcean registrar; DNS is
  # delegated to Cloudflare (see edge/cloudflare.go). The Pulumi program
  # derives the per-service hostnames from rootDomain:
  #   - app.ironflyer.ai     → Vercel (CNAME → cname.vercel-dns.com)
  #   - api.ironflyer.ai     → ingress LB IP, proxied (orchestrator GraphQL)
  #   - runtime.ironflyer.ai → ingress LB IP, proxied (workspace runtime)
  #   - docs.ironflyer.ai    → Vercel (CNAME)
  # The apex `ironflyer.ai` is owned by the Vercel project's domain config
  # (vercelDomain = app.ironflyer.ai is the production deployment; the apex
  # CNAME is wired inside the Vercel project, not by this Pulumi program).
  # NS records to set at the DigitalOcean registrar are documented in
  # docs/RUNBOOKS/cold-start.md § 9.
  ironflyer:vercelDomain: app.ironflyer.ai
  ironflyer:rootDomain: ironflyer.ai
  ironflyer:spacesRegion: ams3
