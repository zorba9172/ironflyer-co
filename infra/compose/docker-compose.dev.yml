# Ironflyer local dev infra.
#
# Default (`docker compose up -d`) brings up the LEAN stack only:
#   postgres + redis + surrealdb + minio   (~300 MB combined RAM).
# That's everything orchestrator + runtime need to start. Heavy / optional
# services are gated behind profiles you opt into:
#
#   --profile analytics    redpanda + clickhouse   (~1.3 GB) — event stream → CH
#   --profile temporal     temporal + temporal-ui  (~768 MB) — durable workflows
#   --profile stripe       stripe-cli forwarder    — webhook tunnel
#   --profile apps         orchestrator+runtime+web — run apps in containers
#   --profile full         everything above        — kitchen-sink dev box
#
# Note: Studio uses VS Code surfaces for code work. The lean dev
# compose path keeps the apps fast on host; run an OpenVSCode service
# separately when testing the embedded IDE route.
#
# Most dev sessions only need the lean default + the apps on host. Apps on
# host iterate fastest; switch to `--profile apps` only when you need to
# test the production container build path.
# Run with:
#   docker compose -f infra/compose/docker-compose.dev.yml up -d

services:
  postgres:
    # pgvector image = postgres:16 + the pgvector extension preinstalled.
    # Required by migration 00017_pgvector_memory.sql (`CREATE EXTENSION vector`).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ironflyer
      POSTGRES_PASSWORD: ironflyer
      POSTGRES_DB: ironflyer
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironflyer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- analytics profile (opt-in: --profile analytics) -----------------
  # Redpanda + ClickHouse are heavy (~1.3 GB combined RAM) and only needed
  # for the event-stream → analytics pipeline. The orchestrator gracefully
  # degrades when REDPANDA_BROKERS / CLICKHOUSE_URL are unset.
  redpanda:
    profiles: ["analytics", "full"]
    image: redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "127.0.0.1:19092:19092"
      - "127.0.0.1:9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    mem_limit: 768m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse:
    profiles: ["analytics", "full"]
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_DB: ironflyer
      CLICKHOUSE_USER: ironflyer
      CLICKHOUSE_PASSWORD: ironflyer
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../clickhouse:/docker-entrypoint-initdb.d:ro
    depends_on:
      redpanda: { condition: service_healthy }
    mem_limit: 1g
    cpus: 1.0
    healthcheck:
      # Use 127.0.0.1 explicitly — BusyBox wget in the Alpine CH image
      # resolves "localhost" to ::1 first, and the IPv6 listen on :8123
      # fails inside the container (the CH log warns
      # "Listen [::]:8123 failed: Address family for hostname not
      # supported"), so the healthcheck stays "unhealthy" even though
      # the v4 listener is up and curl from outside works.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # SurrealDB — multi-model (document + graph + relational) store for the
  # project knowledge graph. Live-query support gives us streaming UI updates
  # straight from the DB. Default endpoint: ws://localhost:8000/rpc
  surrealdb:
    # Pinned to v2.x: the surrealdb.go v1.4.0 SDK emits v2 SurrealQL
    # (type::thing, classic ORDER BY). v3 renamed those and the audit/seed
    # queries fatal on it. Pin (not :latest) for reproducible, stable boots.
    image: surrealdb/surrealdb:v2.3.7
    # Persistent surrealkv store (parity with prod). The brain — knowledge
    # graph + AI memory + audit hash-chain — must survive `compose down`
    # so a dev session keeps the graph it built. Runs as root in dev so the
    # named volume needs no host-side chown.
    user: root
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - root
      - surrealkv:/data/ironflyer.db
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - surreal-data:/data
    # The image is distroless (no /bin/sh) and the v3 binary renamed the
    # readiness flag, so the old CMD-SHELL probe could never run. Exec form
    # against `surreal isready` (defaults to ws://localhost:8000) works.
    healthcheck:
      test: ["CMD", "/surreal", "isready"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ironflyer
      MINIO_ROOT_PASSWORD: ironflyer-dev
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Temporal dev server (in-memory, no extra DB). Web UI on :8233.
  # For production, swap for a clustered Temporal with PostgreSQL.
  # --- temporal profile (opt-in: --profile temporal) ------------------
  # Skip unless IRONFLYER_EXECUTOR=temporal. The embedded executor is the
  # default for local dev and runs in-process inside the orchestrator.
  temporal:
    profiles: ["temporal", "full"]
    image: temporalio/auto-setup:1.25
    mem_limit: 768m
    cpus: 1.0
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ironflyer
      POSTGRES_PWD: ironflyer
      POSTGRES_SEEDS: postgres
      # The auto-setup image ships its own dynamicconfig under
      # /etc/temporal/config/dynamicconfig/docker.yaml; pointing at a
      # nonexistent path made the server crash on boot. Mount our own
      # empty file so server-defaults apply and the container stays up.
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development-sql.yaml
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      - "127.0.0.1:7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    profiles: ["temporal", "full"]
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "127.0.0.1:8233:8080"
    depends_on:
      - temporal

  # --- ide profile (opt-in: --profile ide) -----------------------------
  # OpenVSCode Server: upstream VS Code in the browser, wrapped in a slim
  # IronFlyer profile and mounted at /ide for the Studio iframe.
  #
  # Bring up with:
  #   docker compose -f infra/compose/docker-compose.dev.yml --profile ide up -d openvscode
  #
  # Direct URL: http://localhost:3030/ide/?folder=/home/workspace/projects/demo
  openvscode:
    profiles: ["ide", "full"]
    build:
      context: ../..
      dockerfile: infra/docker/ironflyer-openvscode.Dockerfile
    image: ironflyer/openvscode:dev
    environment:
      OPENVSCODE_SERVER_ROOT: /home/.openvscode-server
    ports:
      - "127.0.0.1:3030:3000"
    volumes:
      - workspace-data:/home/workspace
      - ../../.ironflyer/ide-sync/projects:/home/workspace/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - --without-connection-token
      - --server-base-path
      - /ide
      - /home/workspace
    mem_limit: 1g
    cpus: 1.5

  # Stripe CLI — opt in with `--profile stripe` to forward webhook events
  # into the local orchestrator. Requires STRIPE_DEVICE_NAME +
  # STRIPE_API_KEY (restricted key with checkout + webhook scopes) in your
  # .env so the CLI can authenticate without an interactive `stripe login`
  # the first time. On first use: `docker compose run stripe login`.
  stripe:
    profiles: ["stripe"]
    image: stripe/stripe-cli:latest
    command:
      - listen
      - --forward-to
      - http://host.docker.internal:8080/budget/webhook
      - --skip-verify
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_DEVICE_NAME: ironflyer-local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------
  # App services — opt in with `--profile apps`. These reference PREBUILT
  # images (no `build:` block): run `scripts/build-docker.sh` first so the
  # ironflyer/{orchestrator,runtime,web}:dev tags exist locally.
  #
  # Host ports are overrideable via env so this profile can run alongside
  # apps-on-host without colliding. Defaults bump them off the canonical
  # ports the host orchestrator/runtime/web already use:
  #
  #   ORCHESTRATOR_HOST_PORT  default 8081  (host orchestrator runs on 8080)
  #   RUNTIME_HOST_PORT       default 8091  (host runtime runs on 8090)
  #   WEB_HOST_PORT           default 3001  (host web runs on 3000)
  #
  # Bring up with:
  #   docker compose -f infra/compose/docker-compose.dev.yml \
  #     --profile apps up -d
  # ---------------------------------------------------------------------
  orchestrator:
    profiles: ["apps"]
    image: ironflyer/orchestrator:dev
    # env_file is loaded BEFORE the explicit environment: block, so values
    # under `environment:` always win — the file is the place to drop
    # secrets (API keys, OAuth tokens) without committing them. Missing
    # file is a hard error in compose v2 unless `required: false`.
    env_file:
      - path: ../../.env.local
        required: false
    environment:
      IRONFLYER_ADDR: ":8080"
      IRONFLYER_ENV: dev
      IRONFLYER_LOG_FORMAT: console
      IRONFLYER_LOG_LEVEL: info
      IRONFLYER_DB_DRIVER: hybrid
      IRONFLYER_EXECUTOR: embedded
      POSTGRES_URL: postgres://ironflyer:ironflyer@postgres:5432/ironflyer?sslmode=disable
      SURREAL_URL: ws://surrealdb:8000/rpc
      # SurrealDB is the brain in dev too (parity with prod): persistent
      # knowledge graph + AI memory + audit hash-chain. Creds/ns/db fall to
      # config defaults (root/root/ironflyer/main) which match the dev
      # surrealdb container started as root/root.
      IRONFLYER_MEMORY_BACKEND: surreal
      IRONFLYER_AUDIT_BACKEND: surreal
      IRONFLYER_RUNTIME_URL: http://runtime:8090
      IRONFLYER_SCAFFOLD_ROOT: /app/templates
      # Dev convenience: every signUp gets a $50 wallet credit so the paid
      # execution loop is reachable without configuring Stripe. Disable in
      # any non-dev environment.
      IRONFLYER_DEV_WALLET_SEED_USD: "50"
      IRONFLYER_JWT_SECRET: "${IRONFLYER_JWT_SECRET:-dev-secret-change-me-please-32chars-minimum-for-hs256}"
      IRONFLYER_JWT_ISSUER: ironflyer-dev
      REDIS_URL: redis://redis:6379/0
      # Analytics plane (--profile analytics). Empty by default so the
      # lean `--profile apps` path never dials a broker that isn't up —
      # the orchestrator skips the publisher and reads dashboards from
      # Postgres. To exercise the Redpanda→ClickHouse pipeline locally,
      # run `--profile analytics` AND export the two vars, e.g.:
      #   REDPANDA_BROKERS=redpanda:9092 \
      #   IRONFLYER_CLICKHOUSE_HOSTS=clickhouse:9000 \
      #   docker compose ... --profile apps --profile analytics up
      REDPANDA_BROKERS: "${REDPANDA_BROKERS:-}"
      IRONFLYER_CLICKHOUSE_HOSTS: "${IRONFLYER_CLICKHOUSE_HOSTS:-}"
      IRONFLYER_CLICKHOUSE_DATABASE: ironflyer
      IRONFLYER_CLICKHOUSE_USERNAME: ironflyer
      IRONFLYER_CLICKHOUSE_PASSWORD: ironflyer
    ports:
      - "${ORCHESTRATOR_HOST_PORT:-8081}:8080"
    volumes:
      # Bind-mount the repo templates/ so dev edits show up without rebuilding.
      - ../../templates:/app/templates:ro
    depends_on:
      postgres: { condition: service_healthy }
      surrealdb: { condition: service_healthy }

  runtime:
    profiles: ["apps"]
    image: ironflyer/runtime:dev
    environment:
      IRONFLYER_RUNTIME_ADDR: ":8090"
      # Switch to "docker" to use the host's docker.sock (mounted below).
      IRONFLYER_RUNTIME_DRIVER: mock
      IRONFLYER_RUNTIME_WORKSPACE_DIR: /workspaces
      IRONFLYER_LOG_FORMAT: console
    ports:
      - "${RUNTIME_HOST_PORT:-8091}:8090"
    volumes:
      - runtime-workspaces:/workspaces
      # Uncomment to enable the Docker driver (sibling-container model).
      # Mounts host docker.sock — coarse-grained; lock this down in prod.
      # - /var/run/docker.sock:/var/run/docker.sock

  web:
    profiles: ["apps"]
    image: ironflyer/web:dev
    environment:
      NODE_ENV: production
      ORCHESTRATOR_URL: http://orchestrator:8080
      RUNTIME_URL: http://runtime:8090
    ports:
      - "${WEB_HOST_PORT:-3001}:3000"
    depends_on:
      - orchestrator
      - runtime

  # ---------------------------------------------------------------------
  # Temporal-mode orchestrator — opt in with `--profile temporal-orch`.
  # This is a SECOND orchestrator container that runs alongside the
  # default embedded-executor orchestrator (--profile apps). It points
  # at the Temporal frontend brought up by --profile temporal and
  # registers the finisher worker on the ironflyer-finisher task
  # queue. Bring it up with both profiles selected:
  #
  #   docker compose -f infra/compose/docker-compose.dev.yml \
  #     --profile temporal --profile temporal-orch up -d
  #
  # Host port defaults to 8082 so it never collides with the embedded
  # apps-profile orchestrator on 8081 or the host orchestrator on 8080.
  # Shares postgres + the wallet seed env so scripts/v22_smoke.sh runs
  # against it without extra setup.
  # ---------------------------------------------------------------------
  orchestrator-temporal:
    profiles: ["temporal-orch"]
    image: ironflyer/orchestrator:dev
    env_file:
      - path: ../../.env.local
        required: false
    environment:
      IRONFLYER_ADDR: ":8080"
      IRONFLYER_ENV: dev
      IRONFLYER_LOG_FORMAT: console
      IRONFLYER_LOG_LEVEL: info
      IRONFLYER_DB_DRIVER: hybrid
      IRONFLYER_EXECUTOR: temporal
      IRONFLYER_TEMPORAL_HOST: temporal:7233
      IRONFLYER_TEMPORAL_NAMESPACE: default
      IRONFLYER_TEMPORAL_TASK_QUEUE: ironflyer-finisher
      POSTGRES_URL: postgres://ironflyer:ironflyer@postgres:5432/ironflyer?sslmode=disable
      SURREAL_URL: ws://surrealdb:8000/rpc
      IRONFLYER_MEMORY_BACKEND: surreal
      IRONFLYER_AUDIT_BACKEND: surreal
      IRONFLYER_RUNTIME_URL: http://runtime:8090
      IRONFLYER_SCAFFOLD_ROOT: /app/templates
      IRONFLYER_DEV_WALLET_SEED_USD: "50"
      IRONFLYER_JWT_SECRET: "${IRONFLYER_JWT_SECRET:-dev-secret-change-me-please-32chars-minimum-for-hs256}"
      IRONFLYER_JWT_ISSUER: ironflyer-dev
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${ORCHESTRATOR_TEMPORAL_HOST_PORT:-8082}:8080"
    volumes:
      - ../../templates:/app/templates:ro
    depends_on:
      postgres: { condition: service_healthy }
      surrealdb: { condition: service_healthy }

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  clickhouse-data:
  minio-data:
  surreal-data:
  runtime-workspaces:
  workspace-data:
