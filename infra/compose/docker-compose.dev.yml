# Ironflyer local dev infra.
# Brings up the storage/queue/objects layer so the Go orchestrator and Next
# web can run locally against real backends. Run with:
#   docker compose -f infra/compose/docker-compose.dev.yml up -d
#
# App services (orchestrator/runtime/web) are wired but disabled by default —
# `docker compose --profile apps up` to also bring them online inside Docker.
# Without the profile, run the apps on the host (faster iteration) and let
# them dial the storage containers exposed on localhost.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ironflyer
      POSTGRES_PASSWORD: ironflyer
      POSTGRES_DB: ironflyer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironflyer"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_DB: ironflyer
      CLICKHOUSE_USER: ironflyer
      CLICKHOUSE_PASSWORD: ironflyer
    ports:
      - "8123:8123"
      - "9002:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../clickhouse:/docker-entrypoint-initdb.d:ro
    depends_on:
      redpanda: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # SurrealDB — multi-model (document + graph + relational) store for the
  # project knowledge graph. Live-query support gives us streaming UI updates
  # straight from the DB. Default endpoint: ws://localhost:8000/rpc
  surrealdb:
    image: surrealdb/surrealdb:latest
    # In-memory storage is the simplest path for dev — no volume perms, no
    # cleanup. Swap to `surrealkv:/data/ironflyer.db` + a writable volume
    # when persistence is needed (the official image runs as a non-root
    # user, so the volume must be chowned to match).
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - root
      - memory
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "/surreal isready --conn http://localhost:8000 || exit 0"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ironflyer
      MINIO_ROOT_PASSWORD: ironflyer-dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Temporal dev server (in-memory, no extra DB). Web UI on :8233.
  # For production, swap for a clustered Temporal with PostgreSQL.
  temporal:
    image: temporalio/auto-setup:1.25
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ironflyer
      POSTGRES_PWD: ironflyer
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  # code-server is the per-user workspace IDE — Ironflyer-branded build.
  # In dev one shared instance; production has the runtime spawn one per user.
  # Build first with:
  #   docker build -f infra/docker/ironflyer-code.Dockerfile \
  #     -t ironflyer/ironflyer-code:dev .
  codeserver:
    image: ironflyer/ironflyer-code:dev
    build:
      context: ../..
      dockerfile: infra/docker/ironflyer-code.Dockerfile
    environment:
      PASSWORD: ironflyer-dev
    ports:
      - "8443:8080"
    volumes:
      - codeserver-data:/home/coder/project
    command: ["--auth", "password", "--bind-addr", "0.0.0.0:8080", "/home/coder/project"]

  # Stripe CLI — opt in with `--profile stripe` to forward webhook events
  # into the local orchestrator. Requires STRIPE_DEVICE_NAME +
  # STRIPE_API_KEY (restricted key with checkout + webhook scopes) in your
  # .env so the CLI can authenticate without an interactive `stripe login`
  # the first time. On first use: `docker compose run stripe login`.
  stripe:
    profiles: ["stripe"]
    image: stripe/stripe-cli:latest
    command:
      - listen
      - --forward-to
      - http://host.docker.internal:8080/budget/webhook
      - --skip-verify
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_DEVICE_NAME: ironflyer-local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------
  # App services — opt in with `--profile apps`. Templates bind-mounted so
  # `templates/` edits land in the orchestrator container without rebuild.
  # ---------------------------------------------------------------------
  orchestrator:
    profiles: ["apps"]
    image: ironflyer/orchestrator:dev
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator.Dockerfile
    environment:
      IRONFLYER_ADDR: ":8080"
      IRONFLYER_ENV: dev
      IRONFLYER_LOG_FORMAT: console
      IRONFLYER_LOG_LEVEL: info
      IRONFLYER_DB_DRIVER: hybrid
      IRONFLYER_EXECUTOR: temporal
      POSTGRES_URL: postgres://ironflyer:ironflyer@postgres:5432/ironflyer?sslmode=disable
      SURREAL_URL: ws://surrealdb:8000/rpc
      IRONFLYER_RUNTIME_URL: http://runtime:8090
      IRONFLYER_SCAFFOLD_ROOT: /app/templates
      # Temporal worker auto-starts when IRONFLYER_TEMPORAL_HOST is set.
      IRONFLYER_TEMPORAL_HOST: temporal:7233
      IRONFLYER_TEMPORAL_NAMESPACE: default
      IRONFLYER_TEMPORAL_TASK_QUEUE: ironflyer-finisher
      REDPANDA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    volumes:
      # Bind-mount the repo templates/ so dev edits show up without rebuilding.
      - ../../templates:/app/templates:ro
    depends_on:
      postgres: { condition: service_healthy }
      surrealdb: { condition: service_started }
      temporal:  { condition: service_started }
      redpanda: { condition: service_healthy }

  runtime:
    profiles: ["apps"]
    image: ironflyer/runtime:dev
    build:
      context: ../..
      dockerfile: infra/docker/runtime.Dockerfile
    environment:
      IRONFLYER_RUNTIME_ADDR: ":8090"
      # Switch to "docker" to use the host's docker.sock (mounted below).
      IRONFLYER_RUNTIME_DRIVER: mock
      IRONFLYER_RUNTIME_WORKSPACE_DIR: /workspaces
      IRONFLYER_LOG_FORMAT: console
    ports:
      - "8090:8090"
    volumes:
      - runtime-workspaces:/workspaces
      # Uncomment to enable the Docker driver (sibling-container model).
      # Mounts host docker.sock — coarse-grained; lock this down in prod.
      # - /var/run/docker.sock:/var/run/docker.sock

  web:
    profiles: ["apps"]
    image: ironflyer/web:dev
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NODE_ENV: production
      ORCHESTRATOR_URL: http://orchestrator:8080
      RUNTIME_URL: http://runtime:8090
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
      - runtime

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  clickhouse-data:
  minio-data:
  codeserver-data:
  surreal-data:
  runtime-workspaces:
