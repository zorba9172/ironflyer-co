# VictoriaMetrics scrape config. Single agent scrapes every service that
# exposes a /metrics endpoint inside the ironflyer-net docker network.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: ironflyer-prod
    region: hetzner-fsn1

scrape_configs:
  - job_name: orchestrator
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/vmagent/metrics-token
    static_configs:
      - targets:
          - orchestrator-1:8080
          - orchestrator-2:8080
        labels:
          service: orchestrator

  - job_name: runtime
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /etc/vmagent/metrics-token
    static_configs:
      - targets: [runtime:8090]
        labels: { service: runtime }

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
        labels: { service: postgres }

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
        labels: { service: redis }

  - job_name: clickhouse
    metrics_path: /metrics
    static_configs:
      - targets: [clickhouse:9363]
        labels: { service: clickhouse }

  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: [redpanda:9644]
        labels: { service: redpanda }

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: [minio:9000]
        labels: { service: minio }

  - job_name: temporal
    static_configs:
      - targets: [temporal:9090]
        labels: { service: temporal }

  - job_name: victoriametrics-self
    static_configs:
      - targets: [victoriametrics:8428]
        labels: { service: victoriametrics }

  - job_name: caddy
    static_configs:
      - targets: [caddy:2019]
        labels: { service: caddy }

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
        labels: { service: cadvisor }

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]
        labels: { service: node-exporter }
