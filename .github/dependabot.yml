version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
    open-pull-requests-limit: 8

  - package-ecosystem: gomod
    directory: /core/orchestrator
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /core/runtime
    schedule:
      interval: weekly
      day: monday
      time: "07:15"
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /core/cli
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
    open-pull-requests-limit: 5
