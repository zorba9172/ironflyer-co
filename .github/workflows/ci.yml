name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only across the workflow. Jobs that need to publish (images,
# attestations) escalate via their own permissions block.
permissions:
  contents: read

# Cancel superseded CI runs on the same ref. Stays per-ref so concurrent feature
# branches don't trample each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NS: ${{ github.repository_owner }}

jobs:
  go:
    name: Go test + build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [orchestrator, runtime]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'
          cache-dependency-path: core/${{ matrix.module }}/go.sum
      - name: go mod download
        working-directory: core/${{ matrix.module }}
        run: go mod download
      - name: go vet
        working-directory: core/${{ matrix.module }}
        run: go vet ./...
      - name: go test
        working-directory: core/${{ matrix.module }}
        run: go test -race -count=1 ./...
      - name: go build
        working-directory: core/${{ matrix.module }}
        run: go build ./...

      # Post-build smoke for the orchestrator: boot the binary against an
      # in-process Memory store and hit scripts/smoke.sh. Runs only on the
      # orchestrator matrix leg — runtime has its own probes elsewhere.
      - name: smoke (orchestrator)
        if: matrix.module == 'orchestrator'
        shell: bash
        run: |
          set -euo pipefail
          # The smoke script falls back to python3 websockets for the
          # subscription section; install once so we exercise the WS path
          # in CI instead of warn-skipping.
          python3 -m pip install --quiet websockets || true
          # Boot the orchestrator in the background. AuthOptional keeps
          # the smoke runs simple — auth-gated sections warn-skip when
          # SMOKE_BEARER is unset, which is exactly the dev path.
          (cd core/orchestrator && \
             IRONFLYER_AUTH_OPTIONAL=true \
             IRONFLYER_DB_DRIVER=memory \
             IRONFLYER_ADDR=:8080 \
             go run ./cmd/orchestrator >/tmp/orchestrator.log 2>&1 &)
          # Wait up to 30s for /livez to come up.
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/livez >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          IRONFLYER_API_URL=http://localhost:8080 ./scripts/smoke.sh
      - name: smoke logs (on failure)
        if: matrix.module == 'orchestrator' && failure()
        run: tail -200 /tmp/orchestrator.log || true

  web:
    name: Web typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/web/package-lock.json
      - name: npm install
        working-directory: clients/web
        run: npm install --no-audit --no-fund
      - name: typecheck
        working-directory: clients/web
        run: npm run typecheck
      - name: build
        working-directory: clients/web
        # NEXT_TELEMETRY_DISABLED keeps CI logs clean.
        env: { NEXT_TELEMETRY_DISABLED: "1" }
        run: npm run build

  sdk:
    name: SDK typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json
      - name: install deps
        working-directory: packages/sdk
        # Without this step, tsc fails with `Cannot find module 'graphql-request'`
        # because node_modules is never populated — the previous workflow only
        # installed typescript globally and tried to typecheck against the SDK
        # imports without their declaration files present.
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      - name: typecheck
        working-directory: packages/sdk
        run: npx tsc -p tsconfig.json --noEmit

  pulumi-build:
    # Fast feedback that the Pulumi Go programs still compile. This does NOT
    # run `pulumi preview` or touch any cloud — the dedicated pulumi.yml
    # workflow owns deploys. Catching a typo in `infra/pulumi/main.go` here
    # is far cheaper than discovering it during a tag-driven prod up.
    name: Pulumi go build (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `pulumi-data` was retired in the 2026-05-27 Hetzner cutover —
        # the directory no longer exists. `pulumi` is the only active
        # Pulumi tree.
        project: [pulumi]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'
          cache-dependency-path: infra/${{ matrix.project }}/go.sum
      - name: go mod download
        working-directory: infra/${{ matrix.project }}
        run: go mod download
      - name: go vet
        working-directory: infra/${{ matrix.project }}
        run: go vet ./...
      - name: go build
        working-directory: infra/${{ matrix.project }}
        run: go build ./...

  lint-health:
    # Anti-Bloat pre-deploy health pass. Runs every functional driver
    # (govulncheck + jscpd + knip + gocognit + size-limit + lighthouse)
    # and uploads the JSON reports as build artifacts. goleak smoke is
    # intentionally skipped here — it needs a running orchestrator with
    # IRONFLYER_LEAK_PROBE_TOKEN, which the smoke leg already exercises.
    # Lighthouse only runs when IRONFLYER_LH_URL is set on the workflow
    # env (deploy preview URL); without it the gate stays SeverityInfo.
    # INTENTIONALLY non-blocking for now — the team iterates on findings
    # before flipping `continue-on-error: false`. Wire the gates by
    # exporting the artifact paths to:
    #   IRONFLYER_VULN_REPORT_PATH        (govulncheck-*.json)
    #   IRONFLYER_DEDUP_REPORT_PATH       (jscpd-*.json)
    #   IRONFLYER_DEADCODE_REPORT_PATH    (knip-*.json)
    #   IRONFLYER_COMPLEXITY_REPORT_PATH  (gocognit-*.json)
    #   IRONFLYER_BUNDLE_REPORT_PATH      (size-limit-*.json)
    #   IRONFLYER_PERF_REPORT_PATH        (lighthouse-*.json)
    name: Lint-health (Anti-Bloat tools)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'
          cache-dependency-path: core/orchestrator/go.sum
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: clients/web/package-lock.json
      - name: install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: govulncheck (orchestrator + runtime)
        run: ./scripts/lint/run-govulncheck.sh
        continue-on-error: true
      - name: jscpd (clients/web)
        run: ./scripts/lint/run-jscpd.sh
        continue-on-error: true
      - name: knip (TS deadcode)
        run: ./scripts/lint/run-knip.sh
        continue-on-error: true
      - name: gocognit (Go complexity)
        run: ./scripts/lint/run-gocognit.sh
        continue-on-error: true
      - name: install web deps (for size-limit build)
        working-directory: clients/web
        run: npm install --no-audit --no-fund
        continue-on-error: true
      - name: size-limit (web bundle budgets)
        env: { NEXT_TELEMETRY_DISABLED: "1" }
        run: ./scripts/lint/run-size-limit.sh
        continue-on-error: true
      - name: lighthouse (perf/a11y/bp/seo budgets)
        # Only runs when IRONFLYER_LH_URL is set to a reachable deploy
        # preview URL. Same pattern as goleak smoke — the gate stays
        # SeverityInfo "tool not installed" when the URL is absent.
        if: env.IRONFLYER_LH_URL != ''
        env:
          IRONFLYER_LH_URL: ${{ env.IRONFLYER_LH_URL }}
        run: ./scripts/lint/run-lighthouse.sh
        continue-on-error: true
      - name: upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: lint-health-reports
          path: tmp/reports/
          if-no-files-found: warn
          retention-days: 14

  vscode-extension:
    name: VSCode extension build + package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with: { node-version: '20' }
      - name: install
        working-directory: clients/vscode-extension
        run: npm install --no-audit --no-fund
      - name: typecheck
        working-directory: clients/vscode-extension
        run: npm run typecheck
      - name: test
        working-directory: clients/vscode-extension
        run: npm test
      - name: lint
        working-directory: clients/vscode-extension
        run: npm run lint
      - name: build
        working-directory: clients/vscode-extension
        run: npm run build
      - name: package (.vsix)
        working-directory: clients/vscode-extension
        run: npx --yes @vscode/vsce package --no-dependencies --out ironflyer.vsix
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ironflyer-vsix
          path: clients/vscode-extension/ironflyer.vsix

  # ---------------------------------------------------------------------------
  # Vulnerability scanning. Runs in parallel with the build legs — a finding
  # fails the workflow so a vulnerable dep never ships unnoticed. This is the
  # CVE/advisory equivalent of go vet: build-time signal, not a test suite.
  # ---------------------------------------------------------------------------
  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [orchestrator, runtime]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.25'
          cache-dependency-path: core/${{ matrix.module }}/go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck ./...
        working-directory: core/${{ matrix.module }}
        # govulncheck exits non-zero when a known-affected symbol is reachable,
        # which is the gate we want: fail the build on real findings.
        run: govulncheck ./...

  osv-scan:
    name: osv-scanner (npm lockfiles)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with: { node-version: '20' }
      - name: Scan npm lockfiles for HIGH/CRITICAL advisories
        shell: bash
        run: |
          set -euo pipefail
          args=()
          for lf in clients/web/package-lock.json \
                    packages/sdk/package-lock.json \
                    clients/vscode-extension/package-lock.json; do
            if [ -f "$lf" ]; then
              args+=(--lockfile="$lf")
            else
              echo "skip $lf (missing)"
            fi
          done
          if [ ${#args[@]} -eq 0 ]; then
            echo "no lockfiles found; nothing to scan"
            exit 0
          fi
          # osv-scanner exits 1 on any vulnerability. We re-run with JSON
          # output so we can filter to HIGH/CRITICAL only and fail solely on
          # those — lower-severity advisories surface in the log without
          # blocking the build.
          set +e
          npx --yes osv-scanner "${args[@]}"
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "no advisories"
            exit 0
          fi
          npx --yes osv-scanner --format=json "${args[@]}" > osv.json || true
          high_or_crit=$(jq '[.results[]?.packages[]?.vulnerabilities[]? |
                              select((.database_specific.severity // "" |
                                       ascii_upcase) as $s |
                                       $s == "HIGH" or $s == "CRITICAL")] |
                             length' osv.json 2>/dev/null || echo 0)
          echo "HIGH/CRITICAL findings: $high_or_crit"
          if [ "$high_or_crit" -gt 0 ]; then
            jq '.results[]?.packages[]?.vulnerabilities[]? |
                  select((.database_specific.severity // "" | ascii_upcase) as $s |
                          $s == "HIGH" or $s == "CRITICAL") |
                  {id: .id, summary: .summary, severity: .database_specific.severity}' osv.json
            exit 1
          fi
          echo "no HIGH/CRITICAL findings (lower-severity advisories surfaced above)"

  images:
    name: Build + push images
    runs-on: ubuntu-latest
    needs: [go, web, sdk, vscode-extension, govulncheck, osv-scan]
    # Only push images from the canonical main branch — PRs build but never push.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { image: orchestrator,    dockerfile: infra/docker/orchestrator.Dockerfile }
          - { image: runtime,         dockerfile: infra/docker/runtime.Dockerfile }
          - { image: web,             dockerfile: infra/docker/web.Dockerfile }
          - { image: code,            dockerfile: infra/docker/ironflyer-code.Dockerfile }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/ironflyer-${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache backend is free for public repos and dramatically
          # shrinks the rebuild time for orchestrator + runtime layers.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,scope=${{ matrix.image }},mode=max
