name: Helm chart release

# Packages and pushes the Ironflyer Helm chart to GHCR as an OCI artifact and
# attaches the .tgz to a GitHub release. Triggered by tags of the form
# `helm-v<semver>` so chart releases stay decoupled from app releases — the
# chart can iterate on values shape without forcing a new app build.

on:
  push:
    tags:
      - 'helm-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version to publish (without the helm-v prefix), e.g. 0.2.1'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Lint + package + push chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.3

      - name: Resolve chart version
        id: version
        # On a tag push, strip the leading "helm-v" so 0.2.1 ends up as the
        # chart + app version. On a manual run, take the explicit input.
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
          else
            v="${GITHUB_REF_NAME#helm-v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved chart version: $v"

      - name: helm lint
        run: helm lint infra/helm/ironflyer

      - name: helm package
        run: |
          mkdir -p dist
          helm package infra/helm/ironflyer \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination dist

      - name: helm registry login (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: helm push to OCI registry
        # Pushes to oci://ghcr.io/<owner>/charts/ironflyer:<version>. The chart
        # is then consumable via `helm install ironflyer oci://...`.
        run: |
          helm push dist/ironflyer-${{ steps.version.outputs.version }}.tgz \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: ironflyer-helm-${{ steps.version.outputs.version }}
          path: dist/ironflyer-${{ steps.version.outputs.version }}.tgz

      - name: Create GitHub release
        # Only runs on the tag trigger — workflow_dispatch packages and pushes
        # the chart but does not cut a GH release (use the release.yml flow
        # for that if you want changelog + binaries).
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Helm chart ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/ironflyer-${{ steps.version.outputs.version }}.tgz
