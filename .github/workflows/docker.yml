name: Docker images

# Builds + pushes the production container images consumed by Compose, Helm and
# Pulumi compute stacks, including the Next.js web image.
#
# Triggers:
#   - push to main:    publishes :latest, :edge, :sha-<short>
#   - tag v*:          publishes :<tag>, :sha-<short>
#   - workflow_dispatch: manual rebuild (no push tags beyond sha)
#   - pull_request:    builds only, never pushes (used for Dockerfile diffs)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "infra/docker/**"
      - "core/orchestrator/**"
      - "core/runtime/**"
      - "core/cli/**"
      - "clients/web/**"
      - "packages/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NS: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  # Required by attest-build-provenance and cosign keyless signing (Fulcio OIDC).
  id-token: write
  attestations: write

# Serialize per-ref so concurrent pushes on main don't race for the same image
# tag. Cancel-in-progress is safe here — every build is reproducible from the
# resulting commit, and the latest push always wins for :edge/:latest tags.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ubuntu-latest
    # `secrets.*` is not available inside step-level `if:` expressions —
    # GitHub Actions explicitly rejects the workflow with
    #   Unrecognized named-value: 'secrets'
    # Bridge the SIGN_IMAGES toggle through job-level env so the cosign
    # steps below can gate on it via `env.SIGN_IMAGES` instead. Empty
    # repos/forks without the secret set fall through naturally — the
    # expression evaluates to "" which is not equal to "true".
    env:
      SIGN_IMAGES: ${{ secrets.SIGN_IMAGES }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: orchestrator
            dockerfile: infra/docker/orchestrator.Dockerfile
          - image: runtime
            dockerfile: infra/docker/runtime.Dockerfile
          - image: cli
            # The CLI doesn't ship with a dedicated Dockerfile yet; we reuse the
            # orchestrator multi-stage builder and override CMD via build args.
            # If/when infra/docker/cli.Dockerfile lands, swap the path below.
            dockerfile: infra/docker/orchestrator.Dockerfile
            build_args: |
              CLI_BUILD=true
          - image: web
            dockerfile: infra/docker/web.Dockerfile
          - image: ironflyer-code
            dockerfile: infra/docker/ironflyer-workspace.Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU (arm64 emulation for multi-arch builds)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        # Skip the login on PRs — we don't push, and pull_request from forks
        # doesn't have a GITHUB_TOKEN with packages:write anyway.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/ironflyer-${{ matrix.image }}
          tags: |
            # Short SHA — always emitted, gives every build a stable handle.
            type=sha,format=short,prefix=sha-
            # Git tag like v1.4.0 — only on tag pushes.
            type=ref,event=tag
            # :latest follows the default branch.
            type=raw,value=latest,enable={{is_default_branch}}
            # :edge is the running tip of main, separate from :latest so we can
            # pin :latest to the last green release if we ever want to.
            type=raw,value=edge,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=ironflyer-${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Resolve build metadata
        id: bm
        run: |
          # BUILD_VERSION — git tag when the trigger is a tag push, otherwise
          # short SHA. /version exposes this verbatim so operators can correlate
          # a running container with a commit at a glance.
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ver="$GITHUB_REF_NAME"
          else
            ver="sha-${GITHUB_SHA::7}"
          fi
          echo "version=$ver"     >> "$GITHUB_OUTPUT"
          echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          # Only push on push-style events. PR builds verify the Dockerfile
          # parses + builds, but never publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.build_args }}
            NEXT_PUBLIC_IRONFLYER_API_URL=${{ vars.NEXT_PUBLIC_IRONFLYER_API_URL || 'https://api.ironflyer.ai' }}
            BUILD_VERSION=${{ steps.bm.outputs.version }}
            BUILD_COMMIT=${{ steps.bm.outputs.commit }}
            BUILD_TIME=${{ steps.bm.outputs.time }}
          # GHA cache backend keeps the orchestrator+runtime Go layers warm
          # between builds. mode=max also caches intermediate stages, which
          # halves wall-clock time on cold runs.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance (SLSA)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/ironflyer-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Optional keyless cosign signing. Gated on SIGN_IMAGES so forks (or the
      # initial bootstrap before OIDC is wired into Fulcio) can still build.
      # env.SIGN_IMAGES is bridged from secrets.SIGN_IMAGES at the job level.
      - name: Install cosign
        if: github.event_name != 'pull_request' && env.SIGN_IMAGES == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign image (cosign keyless)
        if: github.event_name != 'pull_request' && env.SIGN_IMAGES == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NS }}/ironflyer-${{ matrix.image }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"
