name: Pulumi

# Two-project Pulumi orchestration:
#   - infra/pulumi       — compute, EKS, edge, DNS, Vercel binding
#   - infra/pulumi-data  — RDS, ElastiCache, S3, KMS, EFS (StackReference source)
#
# Behavior:
#   - Pull request touching infra/pulumi(-data)/**: previews against the `dev`
#     stack and comments the diff on the PR.
#   - Tag `pulumi-prod-{eu,us,il}-v*`: `pulumi up --yes` against the matching
#     production stack.
#   - workflow_dispatch: run preview or up against any stack on demand.

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/pulumi/**'
      - 'infra/pulumi-data/**'
      - '.github/workflows/pulumi.yml'
  push:
    tags:
      - 'pulumi-prod-eu-v*'
      - 'pulumi-prod-us-v*'
      - 'pulumi-prod-il-v*'
  workflow_dispatch:
    inputs:
      project:
        description: 'Pulumi project directory'
        required: true
        type: choice
        options:
          - infra/pulumi
          - infra/pulumi-data
      stack:
        description: 'Stack name (dev | staging | prod-eu | prod-us | prod-il)'
        required: true
        default: dev
      command:
        description: 'preview or up'
        required: true
        type: choice
        options: [preview, up]
        default: preview

permissions:
  contents: read
  pull-requests: write
  # Required for aws-actions/configure-aws-credentials OIDC role assumption.
  id-token: write

# Never run two Pulumi ops against the same ref concurrently. Cancel in
# progress on PR previews (the latest diff wins) but DO NOT cancel a tag-
# driven `up` mid-flight — that would leave cloud resources half-applied.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PULUMI_VERSION: 3.130.0
  GO_VERSION: '1.25'

jobs:
  # ---------------------------------------------------------------------------
  # Resolve which stack(s) to act on. The matrix downstream consumes this.
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve stack matrix
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.resolve.outputs.stack }}
      command: ${{ steps.resolve.outputs.command }}
      aws_region: ${{ steps.resolve.outputs.aws_region }}
    steps:
      - id: resolve
        # The mapping below mirrors infra/pulumi/Pulumi.*.yaml file names.
        # Region is required for the AWS OIDC role; we encode it per stack so
        # we don't need to read the Pulumi config before assuming a role.
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request)
              echo "stack=dev"     >> "$GITHUB_OUTPUT"
              echo "command=preview" >> "$GITHUB_OUTPUT"
              echo "aws_region=eu-central-1" >> "$GITHUB_OUTPUT"
              ;;
            push)
              ref="${GITHUB_REF_NAME}"
              case "$ref" in
                pulumi-prod-eu-*) stack=prod-eu; region=eu-central-1 ;;
                pulumi-prod-us-*) stack=prod-us; region=us-east-1 ;;
                pulumi-prod-il-*) stack=prod-il; region=il-central-1 ;;
                *) echo "Unrecognised tag $ref"; exit 1 ;;
              esac
              echo "stack=$stack"       >> "$GITHUB_OUTPUT"
              echo "command=up"         >> "$GITHUB_OUTPUT"
              echo "aws_region=$region" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              stack="${{ github.event.inputs.stack }}"
              case "$stack" in
                prod-us) region=us-east-1 ;;
                prod-il) region=il-central-1 ;;
                *)       region=eu-central-1 ;;
              esac
              echo "stack=$stack" >> "$GITHUB_OUTPUT"
              echo "command=${{ github.event.inputs.command }}" >> "$GITHUB_OUTPUT"
              echo "aws_region=$region" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ---------------------------------------------------------------------------
  # Run the data project first when both are in play — pulumi-data publishes
  # outputs that pulumi (compute) consumes via StackReference. On a PR or a
  # manual run for a single project we still execute both, but the compute
  # job declares `needs: data` so order is deterministic.
  # ---------------------------------------------------------------------------
  data:
    name: pulumi-data (${{ needs.resolve.outputs.command }} ${{ needs.resolve.outputs.stack }})
    needs: resolve
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.project == 'infra/pulumi-data'
    runs-on: ubuntu-latest
    env:
      PULUMI_STACK_NAME: ${{ needs.resolve.outputs.stack }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: infra/pulumi-data/go.sum

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ needs.resolve.outputs.aws_region }}

      - uses: pulumi/actions@cd99a7f8865434dd3532b586a26f9ebea596894f  # v5
        with:
          command: ${{ needs.resolve.outputs.command }}
          stack-name: ${{ needs.resolve.outputs.stack }}
          work-dir: infra/pulumi-data
          comment-on-pr: ${{ github.event_name == 'pull_request' }}
          # Approve on tag-driven prod deploys; previews never mutate.
          upsert: false
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  compute:
    name: pulumi (${{ needs.resolve.outputs.command }} ${{ needs.resolve.outputs.stack }})
    needs: [resolve, data]
    # Compute always runs unless the manual dispatch is targeted only at data.
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.project == 'infra/pulumi') && needs.data.result != 'failure' }}
    runs-on: ubuntu-latest
    env:
      PULUMI_STACK_NAME: ${{ needs.resolve.outputs.stack }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: infra/pulumi/go.sum

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ needs.resolve.outputs.aws_region }}

      - uses: pulumi/actions@cd99a7f8865434dd3532b586a26f9ebea596894f  # v5
        with:
          command: ${{ needs.resolve.outputs.command }}
          stack-name: ${{ needs.resolve.outputs.stack }}
          work-dir: infra/pulumi
          comment-on-pr: ${{ github.event_name == 'pull_request' }}
          upsert: false
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
