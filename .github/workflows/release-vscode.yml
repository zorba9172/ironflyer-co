name: Release VSCode extension

# Triggered by pushing a tag like `vscode-v0.1.0`. The tag must point to a
# commit on main where clients/vscode-extension/package.json has the matching
# `version`. The job builds, packages, and (when secrets are present)
# publishes to both the VS Marketplace and the Open VSX registry, then
# attaches the .vsix to a GitHub Release.

on:
  push:
    tags: ['vscode-v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build only, do not publish'
        type: boolean
        default: true

# Default to read-only; the release job escalates to contents:write.
permissions:
  contents: read

# Releases are tag-driven and not idempotent against the marketplace, so we
# never cancel an in-flight publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version: '20' }

      - name: Install
        working-directory: clients/vscode-extension
        run: npm install --no-audit --no-fund

      - name: Verify (typecheck + test + lint + build)
        working-directory: clients/vscode-extension
        run: |
          npm run typecheck
          npm test
          npm run lint
          npm run build

      - name: Package
        working-directory: clients/vscode-extension
        run: npx --yes @vscode/vsce package --no-dependencies --out ironflyer.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ironflyer-vsix
          path: clients/vscode-extension/ironflyer.vsix

      - name: Publish to VS Marketplace
        if: ${{ startsWith(github.ref, 'refs/tags/vscode-v') && env.VSCE_PAT != '' && !inputs.dry_run }}
        working-directory: clients/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath ironflyer.vsix

      - name: Publish to Open VSX
        if: ${{ startsWith(github.ref, 'refs/tags/vscode-v') && env.OVSX_PAT != '' && !inputs.dry_run }}
        working-directory: clients/vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish ironflyer.vsix

      - name: GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/vscode-v') && !inputs.dry_run }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: clients/vscode-extension/ironflyer.vsix
          tag_name: ${{ github.ref_name }}
          name: VSCode extension ${{ github.ref_name }}
          generate_release_notes: true
