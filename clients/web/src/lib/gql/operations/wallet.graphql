# Wallet operations — surfaces the prepaid credit balance and the
# multi-provider hosted-checkout entrypoint. Consumed by the Nav wallet
# chip and the /wallet page.

query Wallet {
  wallet {
    tenantID
    balanceUSD
    holdUSD
    availableUSD
    lifetimeTopUpUSD
    lifetimeSpendUSD
    updatedAt
  }
}

query WalletTopUps($limit: Int) {
  walletTopUps(limit: $limit) {
    id
    provider
    amountUSD
    status
    createdAt
    completedAt
  }
}

query WalletAvailableProviders {
  walletAvailableProviders {
    name
    label
    isPrimary
  }
}

mutation WalletCreateTopUp($amountUSD: Float!, $provider: String) {
  walletCreateTopUp(amountUSD: $amountUSD, provider: $provider) {
    url
    sessionID
    provider
  }
}
