# GraphQL codegen for the Ironflyer VSCode extension.
#
# Schema lives in the orchestrator repo so the wire contract stays in
# one place; operations live next to the TypeScript that uses them.
#
# Output goes to src/gql/ via the modern `client` preset — it emits a
# unified `graphql()` tagged-template that returns fully typed
# `TypedDocumentNode<TData, TVariables>` suitable for Apollo Client's
# `query`, `mutate`, and `subscribe` entry points.
schema: ../orchestrator/internal/graph/schema/*.graphql
documents:
  - src/**/*.graphql
generates:
  src/gql/:
    preset: client
    config:
      enumsAsTypes: true
      useTypeImports: true
      avoidOptionals: false
      scalars:
        DateTime: string
        Decimal: string
        JSON: any
        Bytes: string
