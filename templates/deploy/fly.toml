# Generated by Ironflyer's DeployGate. The {{APP_NAME}} and {{PRIMARY_REGION}}
# placeholders are filled in by the gate; everything else can be tuned.

app = "{{APP_NAME}}"
primary_region = "{{PRIMARY_REGION}}"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "{{PORT}}"

[http_service]
  internal_port = {{PORT}}
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
