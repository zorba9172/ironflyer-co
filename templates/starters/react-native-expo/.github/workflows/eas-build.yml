# EAS Build — produces Android + iOS binaries through Expo's managed
# cloud builders. Triggered on push to main (preview channel) and
# manually for arbitrary profiles. The `--no-wait` flag returns the
# build IDs immediately so the workflow does not consume Actions minutes
# while EAS queues the build.
name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        type: choice
        options:
          - development
          - preview
          - production
        default: preview
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Expo doctor
        run: npx expo-doctor

      - name: EAS build
        run: |
          eas build \
            --platform all \
            --profile=${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
