# Android Release — signs an AAB and uploads it to the Play Store
# internal track. Manual-only because publishing is a one-way action.
# The release-key material is supplied as repo secrets; the workflow
# never writes them to disk in cleartext form that survives the run.
name: Android Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: Play Store track
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      release_status:
        description: Release status sent to the Play Console
        type: choice
        options:
          - draft
          - completed
        default: draft

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      aab-path: app/build/outputs/bundle/release/app-release.aab
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Bundle release AAB
        env:
          IRONFLYER_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          IRONFLYER_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          IRONFLYER_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          IRONFLYER_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  play-upload:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY }}
          packageName: com.ironflyer.starter
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track }}
          status: ${{ github.event.inputs.release_status }}
