# GraphQL operations consumed by the Ironflyer CLI.
#
# Each operation corresponds to one CLI subcommand (or one internal helper).
# Field selections are intentionally minimal: the CLI's job is to surface
# human-readable rows, so we ask only for what the terminal output uses.
#
# Regenerate generated.go with:
#   cd core/cli/internal/gql && go run github.com/Khan/genqlient

# ---- Health / version ----

query Version {
  ping
  version {
    version
    commit
    buildTime
    service
  }
}

# ---- Auth ----

mutation SignIn($email: String!, $password: String!) {
  signIn(input: { email: $email, password: $password }) {
    token
    user {
      id
      email
      name
      plan
    }
  }
}

query Me {
  me {
    id
    email
    name
    plan
    createdAt
  }
}

# ---- Projects ----

query ListProjects {
  projects {
    id
    name
    description
    status
    isPublic
    updatedAt
  }
}

query GetProject($id: ID!) {
  project(id: $id) {
    id
    name
    description
    status
    ownerId
    isPublic
    idea
    createdAt
    updatedAt
  }
}

mutation CreateProject($name: String!, $description: String, $idea: String) {
  createProject(input: { name: $name, description: $description, idea: $idea }) {
    id
    name
    description
    status
    createdAt
  }
}

mutation BulkDeleteProjects($ids: [ID!]!) {
  bulkDeleteProjects(ids: $ids) {
    ok
    message
  }
}

mutation RunFinisher($id: ID!) {
  runFinisher(id: $id)
}

query GetProjectGraph($id: ID!) {
  projectGraph(id: $id) {
    nodes {
      id
      path
      language
      size
    }
    edges {
      from
      to
      kind
    }
  }
}

# ---- Patches ----

query ListPatches($projectId: ID!) {
  patches(projectId: $projectId) {
    id
    projectId
    title
    summary
    author
    status
    createdAt
    appliedAt
  }
}

mutation ApplyPatch($patchId: ID!) {
  applyPatch(patchId: $patchId) {
    id
    status
    appliedAt
  }
}

# ---- Deploy / export ----

mutation StartDeploy($projectId: ID!, $target: String!, $ref: String, $env: JSON) {
  startDeploy(input: { projectId: $projectId, target: $target, ref: $ref, env: $env }) {
    id
    projectId
    target
    status
    url
    startedAt
  }
}

mutation ExportZipUrl($projectId: ID!) {
  exportZipUrl(projectId: $projectId)
}

mutation ExportGithub($projectId: ID!, $owner: String!, $repo: String!) {
  exportGithub(projectId: $projectId, owner: $owner, repo: $repo) {
    ok
    message
  }
}

# ---- Memory ----

query ListMemory($query: MemoryQueryInput) {
  memory(query: $query) {
    id
    kind
    userId
    projectId
    storyId
    gateName
    title
    body
    tags
    createdAt
  }
}

mutation AddMemory($input: AddMemoryInput!) {
  addMemory(input: $input) {
    id
    kind
    userId
    projectId
    gateName
    title
    body
    tags
    createdAt
  }
}

mutation DeleteMemory($id: ID!) {
  deleteMemory(id: $id) {
    ok
    message
  }
}

# ---- Audit ----

query ListAudit($query: AuditQueryInput) {
  audit(query: $query) {
    id
    ts
    userId
    projectId
    action
    outcome
    hash
    prevHash
    payload
  }
}

query VerifyAudit {
  verifyAudit {
    intact
    firstBadIndex
  }
}

# ---- Telemetry ----

query AgentTelemetry($limit: Int, $role: String, $provider: String, $model: String) {
  agentTelemetry(limit: $limit, role: $role, provider: $provider, model: $model) {
    id
    ts
    role
    provider
    model
    promptTokens
    completionTokens
    costUsd
    durationMs
    error
  }
}

# ---- Subscriptions ----

subscription RunProject($projectId: ID!) {
  runProject(projectId: $projectId) {
    __typename
    ... on RunExecutionEvent {
      ts
      payload
    }
    ... on RunGateEvent {
      ts
      gate
      status
      gateMessage: message
    }
    ... on RunDoneEvent {
      ts
      ok
      summary
    }
    ... on RunErrorEvent {
      ts
      code
      errorMessage: message
    }
  }
}

subscription DeployStream($deployId: ID!) {
  deployStream(deployId: $deployId) {
    __typename
    ... on DeployStateEvent {
      deployId
      status
      ts
    }
    ... on DeployLogEvent {
      deployId
      line {
        ts
        level
        message
      }
    }
    ... on DeployFinishedEvent {
      deployId
      status
      url
      durationMs
    }
    ... on DeployErrorEvent {
      deployId
      code
      message
    }
  }
}
