# V22 dashboards (Agent 7). Read-only operator views surfaced by the
# `internal/dashboards/` aggregator. Resolvers and the concrete source
# adapters are wired by Agent 8 — this schema file is declarative only.
#
# The blueprint stats type is intentionally renamed to
# `DashboardBlueprintStats` to avoid a name collision with the
# `BlueprintStats` type owned by the blueprints package's GraphQL
# schema.

extend type Query {
  profitDashboard(since: DateTime!, until: DateTime!): ProfitDashboard!
  scaleDashboard: ScaleDashboard!
  cohortDashboard(sinceMonth: DateTime!): CohortDashboard!
  blueprintDashboard: BlueprintDashboard!
  # Code Health Dashboard (playbook §8.11, docs/ANTI_BLOAT_ENGINE.md).
  # Tolerant resolver: missing report files yield zero / empty values
  # so the cockpit panels can render their empty / loading states
  # without surfacing an error.
  healthDashboard: HealthMetrics!
}

type ProfitDashboard {
  windowStart: DateTime!
  windowEnd: DateTime!
  revenueUSD: Float!
  providerCostUSD: Float!
  sandboxCostUSD: Float!
  otherCostUSD: Float!
  grossProfitUSD: Float!
  grossMarginPct: Float!
  activeExecutions: Int!
  blockedExecutions: Int!
  refundCount: Int!
  topUpRate: Float!
}

type ScaleDashboard {
  activeExecutions: Int!
  queuedExecutions: Int!
  queueWaitSec: Float!
  sandboxCapacity: Int!
  workerUtilizationPct: Float!
  scaleHealth: Float!
}

type CohortDashboard {
  cohorts: [Cohort!]!
}

type Cohort {
  month: DateTime!
  newPayingUsers: Int!
  secondExecutionUsers: Int!
  day7RepeatUsers: Int!
  day30RepeatUsers: Int!
  avgSpendUSD: Float!
  grossMarginPct: Float!
  completionRate: Float!
  refundRate: Float!
  supportTicketsPerExec: Float!
}

type BlueprintDashboard {
  blueprints: [DashboardBlueprintStats!]!
}

type DashboardBlueprintStats {
  blueprintID: String!
  executions: Int!
  avgRevenueUSD: Float!
  avgCostUSD: Float!
  grossMarginPct: Float!
  previewSuccess: Int!
  refunds: Int!
  repairCount: Int!
  avgCompletionScore: Float!
}

# HealthMetrics is the operator-facing Code Health snapshot. The shape
# mirrors core/orchestrator/internal/business/dashboards/health.go and
# extends it with the per-directory dup, per-route bundle, and
# architecture projections the panels render. Resolver-tolerant:
# missing reports yield zero values + empty arrays so the UI can
# render its "tool not wired" empty states without crashing.
type HealthMetrics {
  reuseRate: Float!
  dedupRate: Float!
  deadCodeCount: Int!
  complexityHistogram: [ComplexityBucket!]!
  dependencyCycles: Int!
  locPerCapability: Float!
  atlasCapabilityCount: Int!
  lastIndexedAt: DateTime
  duplicationByDir: [DirDup!]!
  bundleByRoute: [RouteBundle!]!
  architecture: Architecture!
}

type ComplexityBucket {
  range: String!
  count: Int!
}

type DirDup {
  directory: String!
  dupPct: Float!
  files: Int!
}

type RouteBundle {
  route: String!
  totalKB: Float!
  firstLoadKB: Float!
}

type Architecture {
  layers: [String!]!
  rules: [ArchRule!]!
  cycles: String!
}

type ArchRule {
  from: String!
  to: String!
  allow: Boolean!
}

# LearningDashboard surfaces the Feedback Brain's high-level signals:
# how many outcomes flowed today / all-time, how confident the bandit
# is, which gates are failing, which blueprints succeed, and what
# weaknesses the pattern miner surfaced. Resolver-tolerant: when
# ClickHouse / mining have not landed any rows the resolver returns
# zero counts + empty arrays so the dashboard renders empty states.
type LearningDashboard {
  outcomeEventsToday: Int!
  outcomeEventsAllTime: Int!
  reuseRateLast7d: Float!
  repairRecipeHitsLast7d: Int!
  banditConfidence: Float!
  averageCompletionScore: Float!
  averageMarginPctLast7d: Float!
  gateFailureRates: [GateFailureRate!]!
  blueprintSuccessRates: [BlueprintSuccessRate!]!
  weaknesses: [Weakness!]!
  lastIndexedAt: DateTime
}

type GateFailureRate {
  gate: String!
  failureRate: Float!
  sampleSize: Int!
}

type BlueprintSuccessRate {
  blueprintID: String!
  blueprintName: String!
  successRate: Float!
  avgMargin: Float!
}

type Weakness {
  dimension: String!
  description: String!
  severity: String!
  suggestedAction: String!
}

extend type Query {
  learningDashboard: LearningDashboard!
}
