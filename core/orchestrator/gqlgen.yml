# gqlgen configuration — Stage 1 of the REST → GraphQL migration.
#
# Schema files live under internal/operations/graph/schema/*.graphql, one per
# domain. Generated server stub lands in internal/operations/graph/generated;
# resolver stubs land in internal/operations/graph/resolver with one file per
# type so parallel agents can each own a slice without diff conflicts.
#
# We hand-write the model package (internal/operations/graph/model/models.go)
# so the nullability + Go field types stay under our control instead of
# gqlgen's auto-conversion heuristics. Scalars map to the shopspring/decimal +
# time/byte types already used by the orchestrator.
schema:
  - internal/operations/graph/schema/*.graphql

exec:
  package: generated
  filename: internal/operations/graph/generated/generated.go

model:
  package: model
  filename: internal/operations/graph/model/generated_models.go

resolver:
  package: resolver
  dir: internal/operations/graph/resolver
  filename_template: "{name}.resolver.go"
  layout: follow-schema

autobind:
  - ironflyer/core/orchestrator/internal/operations/graph/model

omit_slice_element_pointers: true
struct_fields_always_pointers: false
resolvers_always_return_pointers: true
enable_model_json_omitempty_tag: true
skip_validation: false
skip_mod_tidy: true

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.IntID
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  DateTime:
    model:
      - github.com/99designs/gqlgen/graphql.Time
  JSON:
    model:
      - ironflyer/core/orchestrator/internal/operations/graph/model.JSON
  Decimal:
    model:
      - ironflyer/core/orchestrator/internal/operations/graph/model.Decimal
  Bytes:
    model:
      - ironflyer/core/orchestrator/internal/operations/graph/model.Bytes
