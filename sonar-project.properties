sonar.projectKey=ironflyer
sonar.projectName=Ironflyer
sonar.sourceEncoding=UTF-8

sonar.sources=core,clients/studio,packages
sonar.tests=core,clients/studio
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/generated/**,**/tmp/**,clients/web/**,design-reference/**,design-handoff-screenshots/**
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.go.coverage.reportPaths=core/orchestrator/coverage.out,core/runtime/coverage.out,core/cli/coverage.out
sonar.javascript.lcov.reportPaths=clients/studio/coverage/lcov.info
sonar.qualitygate.wait=true
